name: Build and Push Diabetes App Docker Image

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repo
      - uses: actions/checkout@v4

      # 2. Set up QEMU for multi-arch builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      # 3. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 4. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Build, cache, and push Docker image
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: bhavinmoriya/diabetes-app:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=bhavinmoriya/diabetes-app:cache
          cache-to: type=registry,ref=bhavinmoriya/diabetes-app:cache,mode=max

      # 6. Optional: Run container smoke test (lightweight)
      - name: Test built image
        run: |
          docker run --rm -p 8501:8501 bhavinmoriya/diabetes-app:latest sleep 3
          echo "Image built and can run!"
